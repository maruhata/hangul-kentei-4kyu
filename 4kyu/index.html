<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ハングル能力検定 4級 合格教材</title>
<script src="vocab.js"></script>
<style>
  :root{
    --bg:#0f1220; --panel:#1a1f36; --panel2:#232a49; --line:#33406b;
    --text:#e8ecff; --muted:#9aa4cf; --accent:#5b8cff; --accent2:#33d6a6;
    --warn:#ffb24d; --bad:#ff6b8a; --good:#33d6a6; --chip:#2a3358;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI","Hiragino Kaku Gothic ProN","Meiryo","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,#0d1020,#141a30 60%,#0d1020);
    color:var(--text); line-height:1.6; min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(15,18,32,.9); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .hwrap{max-width:1000px;margin:0 auto;padding:14px 18px}
  h1{font-size:19px;margin:0 0 4px}
  .sub{color:var(--muted);font-size:12.5px}
  nav{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
  nav button{
    background:var(--chip);color:var(--text);border:1px solid var(--line);
    padding:7px 13px;border-radius:999px;cursor:pointer;font-size:13px;transition:.15s;
  }
  nav button:hover{border-color:var(--accent)}
  nav button.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  main{max-width:1000px;margin:0 auto;padding:22px 18px 80px}
  .view{display:none;animation:fade .25s}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  h2{font-size:22px;margin:6px 0 6px;display:flex;align-items:center;gap:10px}
  h2 .badge{font-size:11px;background:var(--accent);color:#fff;padding:2px 9px;border-radius:999px;font-weight:600}
  h3{font-size:16px;margin:26px 0 10px;color:#cdd6ff;border-left:4px solid var(--accent);padding-left:10px}
  p.lead{color:var(--muted);margin:0 0 16px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin:14px 0}
  .grid{display:grid;gap:10px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{border:1px solid var(--line);padding:8px 6px;text-align:center}
  th{background:var(--panel2);color:#cdd6ff}
  td .ko{font-size:20px;font-weight:700}
  td .rd{font-size:11px;color:var(--muted)}
  .cell{cursor:pointer;transition:.12s}
  .cell:hover{background:var(--panel2)}
  .kbig{font-size:26px;font-weight:800;color:#fff}
  ul.clean{margin:8px 0;padding-left:20px}
  ul.clean li{margin:5px 0}
  .ko{color:#bcd0ff}
  .hl{color:var(--accent2);font-weight:700}
  .note{background:var(--panel2);border:1px dashed var(--line);border-radius:10px;padding:12px;font-size:13.5px;color:#d6ddff;margin:10px 0}
  .tag{display:inline-block;font-size:11px;background:var(--chip);border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:6px;margin-right:6px}
  .ex{background:var(--panel2);border-radius:10px;padding:10px 12px;margin:8px 0}
  .ex .k{font-size:16px;color:#dfe6ff}
  .ex .j{font-size:13px;color:var(--muted)}
  .ex .r{font-size:12px;color:#7f8ac0}
  /* grammar */
  .gtopic{border:1px solid var(--line);border-radius:12px;margin:10px 0;overflow:hidden;background:var(--panel)}
  .ghead{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .ghead:hover{background:var(--panel2)}
  .gtitle{font-weight:700;font-size:15px}
  .gform{color:var(--accent2);font-size:13px;font-family:monospace}
  .gbody{padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s}
  .gtopic.open .gbody{max-height:1400px;padding:4px 16px 16px}
  .arrow{transition:.2s;color:var(--muted)}
  .gtopic.open .arrow{transform:rotate(90deg)}
  /* flashcards */
  .toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 0}
  select,.btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:8px 12px;border-radius:9px;font-size:13px;cursor:pointer}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
  .btn.good{background:var(--good);border-color:var(--good);color:#08221a;font-weight:700}
  .btn.bad{background:var(--bad);border-color:var(--bad);color:#2a0410;font-weight:700}
  .flash{
    perspective:1200px; margin:16px auto; max-width:460px;
  }
  .flinner{position:relative;width:100%;height:230px;transition:transform .5s;transform-style:preserve-3d;cursor:pointer}
  .flash.flipped .flinner{transform:rotateY(180deg)}
  .fface{position:absolute;inset:0;backface-visibility:hidden;border-radius:16px;border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center}
  .ffront{background:linear-gradient(160deg,#243056,#1a2039)}
  .fback{background:linear-gradient(160deg,#123a30,#0f2a24);transform:rotateY(180deg)}
  .fko{font-size:46px;font-weight:800;color:#fff}
  .fpron{font-size:15px;color:var(--accent2);margin-top:4px;min-height:19px}
  .fipa{font-size:16px;color:#a893ff;margin-top:3px;min-height:20px;font-family:"Noto Sans","Segoe UI",sans-serif;letter-spacing:.3px}
  .from{font-size:15px;color:var(--muted);margin-top:8px}
  .fja{font-size:26px;font-weight:700;color:#d7ffef}
  .fcat{font-size:12px;color:var(--muted);margin-top:6px}
  .counter{color:var(--muted);font-size:13px;text-align:center;margin-top:8px}
  .spk{background:var(--chip);border:1px solid var(--line);color:var(--accent);border-radius:8px;
    cursor:pointer;font-size:12px;padding:2px 7px;transition:.12s}
  .spk:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  .spk.big{margin-top:14px;font-size:14px;padding:8px 16px;border-radius:999px}
  .progressbar{height:8px;background:var(--panel2);border-radius:999px;overflow:hidden;margin:10px 0}
  .progressbar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0}
  /* quiz */
  .qbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px;margin:14px 0}
  .qq{font-size:18px;margin-bottom:14px}
  .qq .big{font-size:30px;font-weight:800;color:#fff}
  .opt{display:block;width:100%;text-align:left;background:var(--panel2);border:1px solid var(--line);
    color:var(--text);padding:12px 14px;border-radius:10px;margin:8px 0;cursor:pointer;font-size:15px;transition:.12s}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:rgba(51,214,166,.18);border-color:var(--good)}
  .opt.wrong{background:rgba(255,107,138,.16);border-color:var(--bad)}
  .opt.disabled{cursor:default;opacity:.9}
  .qmeta{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;margin-bottom:6px}
  .result{text-align:center;padding:24px}
  .result .score{font-size:52px;font-weight:800}
  .kpi{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}
  .kpi>div{flex:1;min-width:130px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;text-align:center}
  .kpi .n{font-size:26px;font-weight:800}
  .kpi .l{font-size:12px;color:var(--muted)}
  .checklist{list-style:none;padding:0}
  .checklist li{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin:8px 0;display:flex;gap:10px;align-items:flex-start}
  .checklist input{margin-top:5px;transform:scale(1.3)}
  a.link{color:var(--accent)}
  .foot{color:var(--muted);font-size:12px;text-align:center;margin-top:30px}
  @media(max-width:600px){
    .fko{font-size:38px}.result .score{font-size:42px}
    td .ko{font-size:17px}
  }
</style>
</head>
<body>
<header>
  <div class="hwrap">
    <h1>🇰🇷 ハングル能力検定 4級 合格教材</h1>
    <div class="sub">ほぼ初心者 → 4級合格まで。文字・発音・文法・単語・クイズをこの1ファイルで。</div>
    <nav id="nav"></nav>
  </div>
</header>
<main id="main"></main>

<script>
/* ============================================================
   データ定義
   ============================================================ */

// --- 母音 ---
const VOWELS_BASIC = [
  ["ㅏ","a","ア"],["ㅑ","ya","ヤ"],["ㅓ","eo","オ(口を開く)"],["ㅕ","yeo","ヨ"],
  ["ㅗ","o","オ(口をすぼめる)"],["ㅛ","yo","ヨ"],["ㅜ","u","ウ(唇を丸く)"],["ㅠ","yu","ユ"],
  ["ㅡ","eu","ウ(唇を横に)"],["ㅣ","i","イ"]
];
const VOWELS_COMPOUND = [
  ["ㅐ","ae","エ"],["ㅒ","yae","イェ"],["ㅔ","e","エ"],["ㅖ","ye","イェ"],
  ["ㅘ","wa","ワ"],["ㅙ","wae","ウェ"],["ㅚ","oe","ウェ"],["ㅝ","wo","ウォ"],
  ["ㅞ","we","ウェ"],["ㅟ","wi","ウィ"],["ㅢ","ui","ウィ/エ"]
];
// --- 子音 ---
const CONSONANTS = [
  ["ㄱ","g/k","カ行(語頭k・語中g)"],["ㄴ","n","ナ行"],["ㄷ","d/t","タ行(語頭t・語中d)"],
  ["ㄹ","r/l","ラ行"],["ㅁ","m","マ行"],["ㅂ","b/p","パ行(語頭p・語中b)"],
  ["ㅅ","s","サ行"],["ㅇ","-/ng","無音(初声)/ン(終声)"],["ㅈ","j","チャ行"],
  ["ㅊ","ch","チャ行(激音)"],["ㅋ","k","カ行(激音)"],["ㅌ","t","タ行(激音)"],
  ["ㅍ","p","パ行(激音)"],["ㅎ","h","ハ行"]
];
const CONSONANTS_TENSE = [
  ["ㄲ","kk","濃音ッカ"],["ㄸ","tt","濃音ッタ"],["ㅃ","pp","濃音ッパ"],
  ["ㅆ","ss","濃音ッサ"],["ㅉ","jj","濃音ッチャ"]
];

// --- 文法トピック(5級復習 + 4級新出) ---
const GRAMMAR = [
  {level:"5級", title:"名詞＋です：이에요/예요・입니다",
   form:"名詞+이에요/예요, 名詞+입니다",
   body:`パッチム有→<span class="hl">이에요</span>、パッチム無→<span class="hl">예요</span>。かたい丁寧形は<span class="hl">입니다</span>。`,
   ex:[["학생이에요.","学生です。","ハクセンイエヨ"],["의사예요.","医者です。","ウィサエヨ"],["회사원입니다.","会社員です。","フェサウォニムニダ"]]},
  {level:"5級", title:"存在：있다(ある/いる)・없다(ない/いない)",
   form:"있어요 / 없어요",
   body:`所有・存在の両方に使う。丁寧形は<span class="hl">있어요/없어요</span>、かたい形は<span class="hl">있습니다/없습니다</span>。`,
   ex:[["시간이 있어요.","時間があります。",""],["돈이 없어요.","お金がありません。",""],["동생이 있습니다.","弟／妹がいます。",""]]},
  {level:"5級", title:"指示：이/그/저・여기/거기/저기",
   form:"이 것(これ)/그것(それ)/저것(あれ)",
   body:`<span class="hl">이</span>(この)・<span class="hl">그</span>(その)・<span class="hl">저</span>(あの)。場所は<span class="hl">여기(ここ)/거기(そこ)/저기(あそこ)</span>。`,
   ex:[["이 사람은 친구예요.","この人は友だちです。",""],["여기가 학교예요.","ここが学校です。",""]]},
  {level:"5級", title:"基本の助詞①：은/는・이/가・을/를",
   form:"은/는(は), 이/가(が), 을/를(を)",
   body:`パッチム有無で形が変わる。は=<span class="hl">은</span>(有)/<span class="hl">는</span>(無)、が=<span class="hl">이</span>(有)/<span class="hl">가</span>(無)、を=<span class="hl">을</span>(有)/<span class="hl">를</span>(無)。`,
   ex:[["저는 일본 사람이에요.","私は日本人です。",""],["빵을 먹어요.","パンを食べます。",""],["물이 좋아요.","水がいいです。",""]]},
  {level:"4級", title:"ヘヨ体(丁寧なです・ます) 아요/어요/해요",
   form:"語幹+아요/어요, 하다→해요",
   body:`語幹末の母音が<span class="hl">ㅏ・ㅗ→아요</span>、それ以外→<span class="hl">어요</span>、<span class="hl">하다→해요</span>。会話で最重要。`,
   ex:[["가다 → 가요","行く→行きます",""],["먹다 → 먹어요","食べる→食べます",""],["공부하다 → 공부해요","勉強する→勉強します",""]]},
  {level:"4級", title:"過去形 았/었/했어요",
   form:"語幹+았어요/었어요, 하다→했어요",
   body:`ヘヨ体と同じ母音ルール。<span class="hl">ㅏ・ㅗ→았어요</span>/その他→<span class="hl">었어요</span>/하다→<span class="hl">했어요</span>。かたい形は<span class="hl">-았/었습니다</span>。`,
   ex:[["먹었어요.","食べました。",""],["봤어요.(보+았)","見ました。",""],["공부했어요.","勉強しました。",""]]},
  {level:"4級", title:"否定：안 / -지 않다",
   form:"안+動詞・形容詞 / 語幹+지 않다",
   body:`前置きの<span class="hl">안</span>と、後置きの<span class="hl">-지 않아요</span>は同じ意味。「하다動詞」は<span class="hl">名詞+안 하다</span>(例:공부 안 해요)。`,
   ex:[["안 가요.","行きません。",""],["가지 않아요.","行きません。",""],["숙제 안 했어요.","宿題しませんでした。",""]]},
  {level:"4級", title:"不可能の否定：못 / -지 못하다",
   form:"못+動詞 / 語幹+지 못하다",
   body:`「〜できない(能力・状況)」。<span class="hl">못</span>は動詞の前。<span class="hl">-지 못해요</span>も同義。`,
   ex:[["술을 못 마셔요.","お酒が飲めません。",""],["가지 못했어요.","行けませんでした。",""]]},
  {level:"4級", title:"願望：-고 싶다(〜したい)",
   form:"動詞語幹+고 싶어요",
   body:`自分の願望。三人称は<span class="hl">-고 싶어하다</span>。`,
   ex:[["한국에 가고 싶어요.","韓国に行きたいです。",""],["쉬고 싶어요.","休みたいです。",""]]},
  {level:"4級", title:"可能：-(으)ㄹ 수 있다/없다",
   form:"語幹+ㄹ 수 있어요(有パッチム:을 수)",
   body:`「〜できる／できない」。パッチム無→<span class="hl">ㄹ 수</span>、有→<span class="hl">을 수</span>。`,
   ex:[["운전할 수 있어요.","運転できます。",""],["갈 수 없어요.","行けません。",""]]},
  {level:"4級", title:"依頼：-아/어 주세요(〜してください)",
   form:"語幹+아/어 주세요",
   body:`相手に何かを頼む表現。ヘヨ体と同じ母音ルール。`,
   ex:[["기다려 주세요.","待ってください。",""],["가르쳐 주세요.","教えてください。",""]]},
  {level:"4級", title:"意志・推量：-겠-",
   form:"語幹+겠어요/겠습니다",
   body:`意志(〜します)・推量(〜でしょう)・控えめ表現に。定型:<span class="hl">알겠습니다(承知しました)/모르겠어요(わかりません)</span>。`,
   ex:[["제가 하겠습니다.","私がやります。",""],["맛있겠어요.","おいしそうです。",""]]},
  {level:"4級", title:"未来・予定：-(으)ㄹ 거예요",
   form:"語幹+ㄹ 거예요(有:을 거예요)",
   body:`「〜するつもり／〜でしょう」。予定・推量の両方。`,
   ex:[["내일 갈 거예요.","明日行くつもりです。",""],["비가 올 거예요.","雨が降るでしょう。",""]]},
  {level:"4級", title:"尊敬：-(으)시-",
   form:"語幹+세요(有:으세요)",
   body:`目上の人の動作を高める。<span class="hl">-(으)세요</span>は尊敬の丁寧＆やわらかい指示にも。特殊尊敬:<span class="hl">먹다→드시다/잡수시다</span>, <span class="hl">자다→주무시다</span>, <span class="hl">있다→계시다</span>。`,
   ex:[["앉으세요.","お座りください。",""],["선생님이 오세요.","先生がいらっしゃいます。",""],["안녕히 주무세요.","おやすみなさい。",""]]},
  {level:"4級", title:"連結：-고(〜して・並列)",
   form:"語幹+고",
   body:`動作の並列・順序。時制は文末で表す。`,
   ex:[["밥을 먹고 학교에 가요.","ご飯を食べて学校へ行きます。",""],["싸고 좋아요.","安くていいです。",""]]},
  {level:"4級", title:"逆接：-지만(〜だが)",
   form:"語幹+지만",
   body:`「〜けれど」。過去は<span class="hl">-았/었지만</span>。`,
   ex:[["비싸지만 맛있어요.","高いけどおいしいです。",""],["갔지만 없었어요.","行ったけどいませんでした。",""]]},
  {level:"4級", title:"理由：-아서/어서・-(으)니까",
   form:"語幹+아서/어서, 語幹+(으)니까",
   body:`どちらも理由。命令・勧誘の理由には<span class="hl">-(으)니까</span>を使う。<span class="hl">-아서/어서</span>は「〜して(順序)」の意味もある。`,
   ex:[["바빠서 못 갔어요.","忙しくて行けませんでした。",""],["비싸니까 사지 마세요.","高いから買わないで。",""]]},
  {level:"4級", title:"仮定：-(으)면(〜ば・たら)",
   form:"語幹+면(有:으면)",
   body:`条件・仮定。<span class="hl">-(으)면 되다</span>=「〜すればよい」。`,
   ex:[["시간이 있으면 만나요.","時間があれば会いましょう。",""],["이거 먹으면 돼요.","これ食べればいいです。",""]]},
  {level:"4級", title:"前置き：-는데/은데",
   form:"動詞:-는데, 形容詞:-(으)ㄴ데",
   body:`状況の前置き・逆接・やわらかい説明。会話頻出。`,
   ex:[["지금 가는데 같이 갈래요?","今行くんですが一緒に行きます？",""],["작은데 예뻐요.","小さいけどかわいいです。",""]]},
  {level:"4級", title:"目的：-(으)러 가다/오다",
   form:"動詞語幹+러 가다(有:으러)",
   body:`「〜しに行く／来る」。移動の目的。`,
   ex:[["밥 먹으러 가요.","ご飯を食べに行きます。",""],["책을 사러 왔어요.","本を買いに来ました。",""]]},
  {level:"4級", title:"進行・状態：-고 있다",
   form:"動詞語幹+고 있어요",
   body:`「〜している」。着用など状態継続にも。`,
   ex:[["뭐 하고 있어요?","何をしていますか？",""],["안경을 쓰고 있어요.","眼鏡をかけています。",""]]},
  {level:"4級", title:"その他の助詞②：에/에서/에게(한테)/으로",
   form:"에(に), 에서(で/から), 에게・한테(に), 으로/로(で/へ)",
   body:`<span class="hl">에</span>=時・場所(存在/到着)、<span class="hl">에서</span>=動作の場所・起点、<span class="hl">에게/한테</span>=人に、<span class="hl">(으)로</span>=手段・方向。`,
   ex:[["학교에 가요.","学校に行きます。",""],["집에서 자요.","家で寝ます。",""],["친구한테 줘요.","友だちにあげます。",""],["버스로 가요.","バスで行きます。",""]]},

   ============================================================ */
let _koVoice=null, _ttsReady=false;
function loadVoices(){
  if(!('speechSynthesis' in window))return;
  const vs=speechSynthesis.getVoices();
  _koVoice=vs.find(v=>v.lang&&v.lang.toLowerCase().startsWith('ko'))||null;
  _ttsReady=vs.length>0;
}
if('speechSynthesis' in window){
  loadVoices();
  speechSynthesis.onvoiceschanged=loadVoices;
}
function speak(text,ev){
  if(ev){ev.stopPropagation();}
  if(!('speechSynthesis' in window)){
    alert('お使いのブラウザは音声読み上げに対応していません。Chrome / Edge / Safari をお試しください。');return;
  }
  loadVoices();
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ko-KR'; u.rate=0.85; u.pitch=1;
  if(_koVoice)u.voice=_koVoice;
  speechSynthesis.speak(u);
}
// 韓国語ハングルだけ抽出して読み上げ（例文の日本語やタグを除く）
function speakKo(text,ev){
  const ko=(text.match(/[가-힣0-9\s.,?!]+/g)||[text]).join(' ').trim();
  speak(ko||text,ev);
}

/* ============================================================
   発音変化エンジン（実際の発音のハングル表記を自動計算）
   連音化・濃音化・鼻音化・流音化・激音化(ㅎ)・ㅎ弱化・口蓋音化に対応
   ============================================================ */
const KP_CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const KP_JUNG=['ㅏ','ㅐ','ㅑ','ㅒ','ㅓ','ㅔ','ㅕ','ㅖ','ㅗ','ㅘ','ㅙ','ㅚ','ㅛ','ㅜ','ㅝ','ㅞ','ㅟ','ㅠ','ㅡ','ㅢ','ㅣ'];
const KP_JONG=['','ㄱ','ㄲ','ㄳ','ㄴ','ㄵ','ㄶ','ㄷ','ㄹ','ㄺ','ㄻ','ㄼ','ㄽ','ㄾ','ㄿ','ㅀ','ㅁ','ㅂ','ㅄ','ㅅ','ㅆ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
const KP_CLUSTER={ㄳ:['ㄱ','ㅅ'],ㄵ:['ㄴ','ㅈ'],ㄺ:['ㄹ','ㄱ'],ㄻ:['ㄹ','ㅁ'],ㄼ:['ㄹ','ㅂ'],ㄽ:['ㄹ','ㅅ'],ㄾ:['ㄹ','ㅌ'],ㄿ:['ㄹ','ㅍ'],ㅄ:['ㅂ','ㅅ']};
const KP_NEUTRAL={'':'','ㄱ':'ㄱ','ㄲ':'ㄱ','ㄳ':'ㄱ','ㄴ':'ㄴ','ㄵ':'ㄴ','ㄶ':'ㄴ','ㄷ':'ㄷ','ㄹ':'ㄹ','ㄺ':'ㄱ','ㄻ':'ㅁ','ㄼ':'ㄹ','ㄽ':'ㄹ','ㄾ':'ㄹ','ㄿ':'ㅂ','ㅀ':'ㄹ','ㅁ':'ㅁ','ㅂ':'ㅂ','ㅄ':'ㅂ','ㅅ':'ㄷ','ㅆ':'ㄷ','ㅇ':'ㅇ','ㅈ':'ㄷ','ㅊ':'ㄷ','ㅋ':'ㄱ','ㅌ':'ㄷ','ㅍ':'ㅂ','ㅎ':'ㄷ'};
const KP_TENSE={ㄱ:'ㄲ',ㄷ:'ㄸ',ㅂ:'ㅃ',ㅅ:'ㅆ',ㅈ:'ㅉ'};
const KP_ASPIRATE={ㄱ:'ㅋ',ㄷ:'ㅌ',ㅂ:'ㅍ',ㅈ:'ㅊ'};
const KP_NASAL={ㄱ:'ㅇ',ㄷ:'ㄴ',ㅂ:'ㅁ'};
function kpDecompose(ch){
  const code=ch.charCodeAt(0)-0xAC00;
  if(code<0||code>11171)return null;
  const cho=Math.floor(code/588), jung=Math.floor((code%588)/28), jong=code%28;
  return {ini:KP_CHO[cho], med:KP_JUNG[jung], fin:KP_JONG[jong]};
}
function kpCompose(s){
  const c=KP_CHO.indexOf(s.ini), j=KP_JUNG.indexOf(s.med), f=KP_JONG.indexOf(s.fin||'');
  if(c<0||j<0)return '';
  return String.fromCharCode(0xAC00+(c*21+j)*28+f);
}
function kpTransformPair(cur,next,nextIsFinalDa,tags){
  if(!cur.fin)return;
  const rep=KP_NEUTRAL[cur.fin];
  if(!next){ const b=cur.fin; cur.fin=KP_NEUTRAL[cur.fin]; if(tags&&b!==cur.fin)tags.add('終声規則'); return; }
  if(next.ini==='ㅇ'){
    if(cur.fin==='ㅎ'){ cur.fin=''; if(tags)tags.add('ㅎ弱化'); return; }
    if(cur.fin==='ㄶ'){ next.ini='ㄴ'; cur.fin=''; if(tags)tags.add('ㅎ弱化'); return; }
    if(cur.fin==='ㅀ'){ next.ini='ㄹ'; cur.fin=''; if(tags)tags.add('ㅎ弱化'); return; }
    if((cur.fin==='ㄷ'||cur.fin==='ㅌ')&&next.med==='ㅣ'){ next.ini=(cur.fin==='ㄷ')?'ㅈ':'ㅊ'; cur.fin=''; if(tags)tags.add('口蓋音化'); return; }
    const cl=KP_CLUSTER[cur.fin];
    if(cl){ cur.fin=cl[0]; next.ini=cl[1]; } else { next.ini=cur.fin; cur.fin=''; }
    if(tags)tags.add('連音化');
    return;
  }
  if(next.ini==='ㄴ'&&cur.fin==='ㄹ'){ next.ini='ㄹ'; if(tags)tags.add('流音化'); return; } // 유음화(逆方向): 설날→설랄
  if(next.ini==='ㄴ'||next.ini==='ㅁ'){
    if(rep==='ㄱ'||rep==='ㄷ'||rep==='ㅂ'){ cur.fin=KP_NASAL[rep]; if(tags)tags.add('鼻音化'); return; }
  }
  if(next.ini==='ㄹ'){
    if(cur.fin==='ㄴ'){ cur.fin='ㄹ'; if(tags)tags.add('流音化'); return; }
    const b=cur.fin; cur.fin=KP_NEUTRAL[cur.fin]; if(tags&&b!==cur.fin)tags.add('終声規則');
    return;
  }
  // 用言語幹の受음ㄴ/ㅁ(ㄵ/ㄻ含む)+辞書形語尾「다」→ 濃音化(表準発音法24項): 앉다→안따, 신다→신따
  // ※名詞+名詞の複合語(例:한국어)と区別するため、直後がちょうど語末の「다」の場合のみ適用
  if(nextIsFinalDa&&(cur.fin==='ㄴ'||cur.fin==='ㄵ'||cur.fin==='ㅁ'||cur.fin==='ㄻ')){
    next.ini=KP_TENSE['ㄷ']; cur.fin=(cur.fin==='ㄴ'||cur.fin==='ㄵ')?'ㄴ':'ㅁ'; if(tags)tags.add('濃音化'); return;
  }
  if(next.ini==='ㄱ'||next.ini==='ㄷ'||next.ini==='ㅂ'||next.ini==='ㅅ'||next.ini==='ㅈ'){
    if(cur.fin==='ㅎ'||cur.fin==='ㄶ'||cur.fin==='ㅀ'){
      if(next.ini!=='ㅅ'){ next.ini=KP_ASPIRATE[next.ini]; cur.fin=(cur.fin==='ㄶ')?'ㄴ':(cur.fin==='ㅀ'?'ㄹ':''); if(tags)tags.add('激音化'); return; }
    }
    if(rep==='ㄱ'||rep==='ㄷ'||rep==='ㅂ'){ next.ini=KP_TENSE[next.ini]; cur.fin=rep; if(tags)tags.add('濃音化'); return; }
  }
  if(next.ini==='ㅎ'){
    if(rep==='ㄱ'||rep==='ㄷ'||rep==='ㅂ'){ next.ini=KP_ASPIRATE[rep]; cur.fin=''; if(tags)tags.add('激音化'); return; }
  }
  { const b=cur.fin; cur.fin=KP_NEUTRAL[cur.fin]; if(tags&&b!==cur.fin)tags.add('終声規則'); }
}
function kpToken(word){
  const syl=[...word].map(kpDecompose);
  if(syl.some(s=>s===null))return word; // ハングル以外を含む場合はそのまま
  for(let i=0;i<syl.length;i++){
    const next=syl[i+1]||null;
    const nextIsFinalDa=!!next && i+1===syl.length-1 && next.ini==='ㄷ' && next.med==='ㅏ' && next.fin==='';
    kpTransformPair(syl[i], next, nextIsFinalDa);
  }
  return syl.map(kpCompose).join('');
}
// 単語/短文全体の実際の発音を返す（空白・記号はそのまま、ハングルのみの区切りごとに変換）
function koPron(text){
  return text.split(/([^가-힣]+)/).map(tok=>/^[가-힣]+$/.test(tok)?kpToken(tok):tok).join('');
}
// 実際の発音と、働いた発音規則名(連音化・濃音化・鼻音化など)を返す（クイズ用）
function kpTokenWithTags(word){
  const syl=[...word].map(kpDecompose);
  if(syl.some(s=>s===null))return {pron:word,tags:[]};
  const tags=new Set();
  for(let i=0;i<syl.length;i++){
    const next=syl[i+1]||null;
    const nextIsFinalDa=!!next && i+1===syl.length-1 && next.ini==='ㄷ' && next.med==='ㅏ' && next.fin==='';
    kpTransformPair(syl[i], next, nextIsFinalDa, tags);
  }
  return {pron:syl.map(kpCompose).join(''), tags:[...tags]};
}
function koPronWithTags(text){
  const tagSet=new Set();
  const pron=text.split(/([^가-힣]+)/).map(tok=>{
    if(/^[가-힣]+$/.test(tok)){ const r=kpTokenWithTags(tok); r.tags.forEach(t=>tagSet.add(t)); return r.pron; }
    return tok;
  }).join('');
  return {pron, tags:[...tagSet]};
}

/* ---------- IPA(国際音声記号)変換 ----------
   発音変化後のジャモ列(kpTransformPair適用後)からIPAを生成。
   平音(ㄱㄷㅂㅈ)は母音間・共鳴音間で有声化(k→ɡ等)、
   ㅅ/ㅆは이/y系母音の前で口蓋化(s→ɕ)。終声は不破裂([k̚][t̚][p̚])。 */
const KP_IPA_ONSET_PLAIN={ㄱ:'k',ㄷ:'t',ㅂ:'p',ㅈ:'tɕ'};
const KP_IPA_ONSET_VOICED={ㄱ:'ɡ',ㄷ:'d',ㅂ:'b',ㅈ:'dʑ'};
const KP_IPA_ONSET_OTHER={ㄲ:'kʼ',ㅋ:'kʰ',ㄴ:'n',ㄸ:'tʼ',ㅌ:'tʰ',ㄹ:'ɾ',ㅁ:'m',ㅃ:'pʼ',ㅍ:'pʰ',ㅅ:'s',ㅆ:'sʼ',ㅉ:'tɕʼ',ㅊ:'tɕʰ',ㅎ:'h'};
const KP_IPA_VOWEL={ㅏ:'a',ㅐ:'ɛ',ㅑ:'ja',ㅒ:'jɛ',ㅓ:'ʌ',ㅔ:'e',ㅕ:'jʌ',ㅖ:'je',ㅗ:'o',ㅘ:'wa',ㅙ:'wɛ',ㅚ:'we',ㅛ:'jo',ㅜ:'u',ㅝ:'wʌ',ㅞ:'we',ㅟ:'wi',ㅠ:'ju',ㅡ:'ɯ',ㅢ:'ɰi',ㅣ:'i'};
const KP_IPA_CODA={ㄱ:'k̚',ㄴ:'n',ㄷ:'t̚',ㄹ:'l',ㅁ:'m',ㅂ:'p̚',ㅇ:'ŋ'};
function kpSylToIPA(syl){
  return syl.map((s,i)=>{
    let onset;
    if(s.ini==='ㅇ'){ onset=''; }
    else if(KP_IPA_ONSET_PLAIN[s.ini]){
      const prev=syl[i-1];
      const prevVoiced=prev&&(prev.fin===''||prev.fin==='ㄴ'||prev.fin==='ㄹ'||prev.fin==='ㅁ'||prev.fin==='ㅇ');
      onset=(i>0&&prevVoiced)?KP_IPA_ONSET_VOICED[s.ini]:KP_IPA_ONSET_PLAIN[s.ini];
    } else {
      onset=KP_IPA_ONSET_OTHER[s.ini]||'';
      if((s.ini==='ㅅ'||s.ini==='ㅆ')&&/^(ㅣ|ㅑ|ㅕ|ㅛ|ㅠ|ㅖ)/.test(s.med)){ onset=(s.ini==='ㅅ')?'ɕ':'ɕʼ'; }
    }
    const vowel=KP_IPA_VOWEL[s.med]||'';
    const coda=s.fin?(KP_IPA_CODA[s.fin]||''):'';
    return onset+vowel+coda;
  }).join('.');
}
function kpTokenIPA(word){
  const syl=[...word].map(kpDecompose);
  if(syl.some(s=>s===null))return word; // ハングル以外はそのまま
  for(let i=0;i<syl.length;i++){
    const next=syl[i+1]||null;
    const nextIsFinalDa=!!next && i+1===syl.length-1 && next.ini==='ㄷ' && next.med==='ㅏ' && next.fin==='';
    kpTransformPair(syl[i], next, nextIsFinalDa);
  }
  return kpSylToIPA(syl);
}
// 単語/短文全体のIPA表記を返す（音節間は"."区切り）
function koIPA(text){
  return text.split(/([^가-힣]+)/).map(tok=>/^[가-힣]+$/.test(tok)?kpTokenIPA(tok):tok).join('');
}

function letterTable(title,arr,cls){
  let rows="";
  arr.forEach(([k,r,j])=>{
    rows+=`<td class="cell" onclick="this.querySelector('.rd2').style.display='block'">
      <div class="ko">${k}</div><div class="rd">${r}</div>
      <div class="rd2" style="display:none;color:#8fe;font-size:11px">${j}</div></td>`;
  });
  // wrap into rows of 5
  let cells=arr.map(([k,r,j])=>`<td class="cell" onclick="tapCell(this)"><div class="ko">${k}</div><div class="rd">${r}</div><div class="rd2" data-j="${j}"></div></td>`);
  let html=`<h3>${title}</h3><table><tbody><tr>`;
  cells.forEach((c,i)=>{ html+=c; if((i+1)%5===0)html+="</tr><tr>"; });
  html+="</tr></tbody></table>";
  return html;
}
function tapCell(td){
  const ko=td.querySelector(".ko");
  if(ko)speakKo(ko.textContent);
  const box=td.querySelector(".rd2");
  if(box.textContent){box.textContent="";box.style.color="";}
  else{box.textContent=box.dataset.j;box.style.color="#7ef2c9";box.style.fontSize="11px";box.style.marginTop="3px";}
}

// 問題生成
function genLetters(){
  const all=[...VOWELS_BASIC,...VOWELS_COMPOUND,...CONSONANTS,...CONSONANTS_TENSE];
  return shuffle(all).slice(0,10).map(([k,r,j])=>{
    const wrong=pick(all,3,null).filter(x=>x[0]!==k).slice(0,3);
    const opts=shuffle([[j,true],...wrong.map(w=>[w[2],false])]);
    return {q:`この文字の読みは？　<span class="big">${k}</span>`,opts};
  });
}
function genVocabJP(){
  return shuffle(VOCAB).slice(0,10).map(v=>{
    const wrong=pick(VOCAB,3,v).map(w=>[w[1],false]);
    const opts=shuffle([[v[1],true],...wrong]);
    return {q:`意味は？　<span class="big">${v[0]}</span>`,opts};
  });
}
function genVocabKO(){
  return shuffle(VOCAB).slice(0,10).map(v=>{
    const wrong=pick(VOCAB,3,v).map(w=>[w[0],false]);
    const opts=shuffle([[v[0],true],...wrong]);
    return {q:`「${v[1]}」を韓国語で？`,opts};
  });
}
const GQ=[
  ["학생___ 아니에요.","が(パッチム有)","이","가","은","를","이"],
  ["빵___ 먹어요.","を(パッチム有)","을","를","이","에","를"],
  ["어제 친구를 ___.(만나다の過去)","会いました","만났어요","만나요","만날 거예요","만나고","만났어요"],
  ["시간이 없___ 못 가요.(理由)","なくて","어서","지만","고","면","어서"],
  ["한국에 가___ 싶어요.(願望)","行きたい","고","서","면","지만","고"],
  ["이 책을 읽___ 수 있어요.(可能)","読める","을","은","고","지","을"],
  ["안 ___.(가다の否定・ヘヨ体)","行きません","가요","가서","갈","가고","가요"],
  ["집___ 공부해요.(場所で)","家で","에서","에","으로","까지","에서"],
  ["더워서 창문을 열어 ___.(依頼)","開けてください","주세요","싶어요","있어요","봤어요","주세요"],
  ["춥다の해요体は？","寒いです","추워요","춥어요","추어요","추요","추워요"],
  ["듣다の해요体は？","聞きます","들어요","듣어요","들으요","듣아요","들어요"],
  ["밥을 먹___ 학교에 가요.(〜して)","食べて","고","서","면","지만","고"],
  ["9시___ 5시까지 일해요.(から)","から","부터","까지","보다","마다","부터"],
  ["친구___ 선물을 줘요.(人に)","に","한테","에서","으로","까지","한테"],
  ["바쁘다の해요体は？(으変則)","忙しいです","바빠요","바쁘어요","바뻐요","바쁴요","바빠요"],
];
function genGrammar(){
  return shuffle(GQ).slice(0,10).map(row=>{
    const [q,hint,correct,...rest]=row;
    const wrongs=rest.slice(0,3); // 3 distractors (last element is dup of correct, ignore)
    const opts=shuffle([[correct,true],...wrongs.slice(0,3).map(w=>[w,false])]);
    return {q:`${q}<div style="color:var(--muted);font-size:13px;margin-top:6px">（${hint}）</div>`,opts};
  });
}
// 単語帳の語から動的に生成：パッチム・連音化・濃音化・鼻音化・激音化などが
// 実際に働く単語を使って「実際の発音」を選ばせるクイズ
function genPron(){
  const pool=VOCAB.map(v=>{ const r=koPronWithTags(v[0]); return {v,pron:r.pron,tags:r.tags}; })
                  .filter(x=>x.pron!==x.v[0]);
  const chosen=shuffle(pool).slice(0,10);
  return chosen.map(({v,pron,tags})=>{
    const naive=v[0]; // つづりそのまま読み(典型的な誤答)
    const others=shuffle(pool.filter(x=>x.pron!==pron&&x.pron!==naive)).map(x=>x.pron);
    const distractors=[...new Set(others)].slice(0,2);
    while(distractors.length<2)distractors.push(naive+'…');
    const opts=shuffle([[pron,true],[naive,false],...distractors.map(d=>[d,false])]);
    const explain=tags.length?`<div style="margin-top:8px;font-size:12.5px;color:var(--accent2)">💡 ${tags.join('・')}</div>`:'';
    return {
      q:`<span class="big" style="font-size:26px">${v[0]}</span><div style="margin-top:4px;color:var(--muted);font-size:13px">(${v[1]})</div><div style="margin-top:6px">実際の発音は？</div>`,
      opts, explain
    };
  });
}
function genMix(){
  return shuffle([...genLetters(),...genVocabJP(),...genGrammar(),...genPron()]).slice(0,10);
}
function startQuiz(cat){
  const gen={letters:genLetters,vocab_jp:genVocabJP,vocab_ko:genVocabKO,grammar:genGrammar,pron:genPron,mix:genMix}[cat];
  quiz={cat,items:gen(),i:0,correct:0,answered:false};
  renderQuiz();
}
function renderQuiz(){
  const area=document.getElementById("quizArea");
  if(quiz.i>=quiz.items.length){return finishQuiz();}
  const it=quiz.items[quiz.i];
  area.innerHTML=`
  <div class="qbox">
    <div class="qmeta"><span>第 ${quiz.i+1} / ${quiz.items.length} 問</span><span>正解 ${quiz.correct}</span></div>
    <div class="qq">${it.q}</div>
    <div id="opts"></div>
    <div id="explain"></div>
    <div id="next" style="text-align:right;margin-top:10px;display:none">
      <button class="btn primary" onclick="quiz.i++;quiz.answered=false;renderQuiz()">次へ ▶</button>
    </div>
  </div>`;
  const opts=document.getElementById("opts");
  it.opts.forEach(([text,ok])=>{
    const b=document.createElement("button");
    b.className="opt"; b.innerHTML=text;
    b.onclick=()=>answer(b,ok,it);
    opts.appendChild(b);
  });
  window.scrollTo({top:9999,behavior:"smooth"});
}
function answer(btn,ok,it){
  if(quiz.answered)return; quiz.answered=true;
  const opts=document.getElementById("opts");
  [...opts.children].forEach(b=>{
    b.classList.add("disabled");
    const isCorrect=it.opts.find(o=>o[0]===b.innerHTML||o[0]===b.textContent);
  });
  // mark
  [...opts.children].forEach(b=>{
    const o=it.opts.find(o=>o[0]===b.innerHTML);
    if(o&&o[1])b.classList.add("correct");
  });
  if(ok){btn.classList.add("correct");quiz.correct++;}
  else{btn.classList.add("wrong");}
  if(it.explain){ const ex=document.getElementById("explain"); if(ex)ex.innerHTML=it.explain; }
  document.getElementById("next").style.display="block";
}
function finishQuiz(){
  const area=document.getElementById("quizArea");
  const pct=Math.round(quiz.correct/quiz.items.length*100);
  const best=store.get("quizBest",{});
  const isNew=best[quiz.cat]==null||pct>best[quiz.cat];
  if(isNew){best[quiz.cat]=pct;store.set("quizBest",best);}
  renderHomeKpi();
  const msg=pct>=80?"合格圏！この分野はバッチリ 🎉":pct>=60?"あと一歩。間違えた所を復習しよう 💪":"復習してもう一度チャレンジ 📖";
  area.innerHTML=`
  <div class="qbox result">
    <div class="score" style="color:${pct>=80?'var(--good)':pct>=60?'var(--warn)':'var(--bad)'}">${pct}%</div>
    <div style="font-size:15px;margin:6px 0">${quiz.correct} / ${quiz.items.length} 問正解</div>
    <div style="color:var(--muted)">${msg}${isNew?'　<b style="color:var(--accent2)">自己ベスト更新！</b>':''}</div>
    <div class="toolbar" style="justify-content:center;margin-top:18px">
      <button class="btn primary" onclick="startQuiz('${quiz.cat}')">もう一度</button>
      <button class="btn" onclick="document.getElementById('quizArea').innerHTML='';window.scrollTo({top:0,behavior:'smooth'})">分野を選ぶ</button>
    </div>
  </div>`;
}

  {q:'反対語：많다（多い）⇔',opts:[["적다",true],["작다",false],["낮다",false],["짧다",false]]},
  {q:'語彙：학생 の意味は？',opts:[["学生",true],["先生",false],["医者",false],["会社員",false]]},
  {q:'尊敬：있다（いる）の尊敬語は？',opts:[["계시다",true],["드시다",false],["주무시다",false],["모시다",false]]},
  {q:'変則：걷다 の해요体は？',opts:[["걸어요",true],["걷어요",false],["거러요",false],["걷아요",false]]},
  {q:'数：「1時半」を韓国語で',opts:[["한 시 반",true],["일 시 반",false],["하나 시 반",false],["한 시 절반",false]]},
  {q:'助詞：물___ 마셔요.（水<b>だけ</b>）',opts:[["만",true],["도",false],["보다",false],["까지",false]]},
  {q:'願望：쉬고 ___.（休みたいです）',opts:[["싶어요",true],["있어요",false],["주세요",false],["보여요",false]]},
  {q:'助数詞：「犬3匹」を韓国語で',opts:[["개 세 마리",true],["개 세 개",false],["개 삼 마리",false],["개 셋 마리",false]]},
]},
];
let exam={items:[],i:0,answered:false,lis:0,wr:0,key:0,name:'',random:false};
function buildExam(){
  const el=document.getElementById("view-exam");
  const best=store.get("examBest",{});
  el.innerHTML=`
  <h2>模擬試験 <span class="badge">STEP8</span></h2>
  <p class="lead">本番形式（聞きとり10問＝40点＋筆記15問＝60点、計100点）。<b>60点以上で合格</b>。</p>
  <div id="examIntro">
    <h3 style="margin-top:6px">📝 直前対策（固定3回）</h3>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 8px">毎回同じ問題。本番前の総仕上げ・復習に。</p>
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr))">
      ${EXAM_SETS.map((s,i)=>`
        <button class="btn" style="padding:18px 14px;text-align:center" onclick="startExam(${i})">
          <div style="font-weight:800;font-size:17px">${s.name}</div>
          <div style="color:var(--muted);font-size:12px;margin-top:6px">自己ベスト ${best[i]!=null?best[i]+"点":"-"}</div>
          <div style="font-size:12px;margin-top:4px;color:${best[i]!=null?(best[i]>=60?'var(--good)':'var(--warn)'):'var(--muted)'}">${best[i]!=null?(best[i]>=60?"✅ 合格":"再挑戦"):"未挑戦"}</div>
        </button>`).join("")}
    </div>
    <h3>🎲 ランダム練習</h3>
    <p style="color:var(--muted);font-size:13px;margin:2px 0 8px">全問題からランダムに25問。毎回ちがう組み合わせで、何度でも練習できます。</p>
    <button class="btn primary" style="font-size:15px;padding:12px 24px" onclick="startExamRandom()">🎲 ランダムで挑戦　<span style="font-weight:400;font-size:12px;opacity:.85">自己ベスト ${best['r']!=null?best['r']+"点":"-"}</span></button>
    <div class="note" style="margin-top:16px">🔊 聞きとりは音声が自動再生されます。うまく再生されない場合は「もう一度聞く」を押してください（初回はブラウザの許可が必要な場合があります）。初級のうちは「スクリプトを見る」でハングルを確認しながらでもOK。</div>
  </div>
  <div id="examArea"></div>`;
}
function uniqBy(arr,f){const seen=new Set();return arr.filter(x=>{const k=f(x);if(seen.has(k))return false;seen.add(k);return true;});}
function loadExam(listen,write,key,name,random){
  const lis=listen.map(x=>({sec:'listen',...x}));
  const wr=write.map(x=>({sec:'write',...x}));
  exam={items:[...lis,...wr],i:0,answered:false,lis:0,wr:0,key,name,random};
  document.getElementById("examIntro").style.display="none";
  renderExam();
}
function startExam(idx){
  idx=idx||0; const s=EXAM_SETS[idx];
  loadExam(s.listen,s.write,idx,s.name,false);
}
function startExamRandom(){
  let allL=[],allW=[];
  EXAM_SETS.forEach(s=>{allL=allL.concat(s.listen);allW=allW.concat(s.write);});
  allL=uniqBy(allL,x=>x.audio); allW=uniqBy(allW,x=>x.q);
  loadExam(shuffle(allL).slice(0,10),shuffle(allW).slice(0,15),'r','ランダム練習',true);
}
function renderExam(){
  const area=document.getElementById("examArea");
  if(exam.i>=exam.items.length)return finishExam();
  const it=exam.items[exam.i];
  const isL=it.sec==='listen';
  const secLabel=isL?`🔊 聞きとり ${exam.i+1}/10`:`✏️ 筆記 ${exam.i-9}/15`;
  area.innerHTML=`
  <div class="qbox">
    <div class="qmeta"><span>${secLabel}</span><span>${exam.name}・${exam.i+1}/${exam.items.length}問</span></div>
    ${isL?`
      <div style="text-align:center;margin:6px 0 14px">
        <button class="btn primary" onclick="speakKo('${it.audio.replace(/'/g,"\\'")}',event)">🔊 もう一度聞く</button>
        <button class="btn" onclick="var s=document.getElementById('script');s.style.display=s.style.display==='none'?'block':'none'">スクリプトを見る</button>
        <div id="script" style="display:none;margin-top:10px;font-size:22px;color:#cfe">${it.audio}</div>
      </div>`:""}
    <div class="qq">${it.q}</div>
    <div id="eopts"></div>
    <div id="enext" style="text-align:right;margin-top:10px;display:none">
      <button class="btn primary" onclick="exam.i++;exam.answered=false;renderExam()">${exam.i+1>=exam.items.length?"結果を見る":"次へ ▶"}</button>
    </div>
  </div>`;
  const opts=document.getElementById("eopts");
  it.opts.forEach(([text,ok])=>{
    const b=document.createElement("button");
    b.className="opt"; b.innerHTML=text;
    b.onclick=()=>answerExam(b,ok,it);
    opts.appendChild(b);
  });
  if(isL)setTimeout(()=>speakKo(it.audio),350); // 自動再生
  window.scrollTo({top:9999,behavior:"smooth"});
}
function answerExam(btn,ok,it){
  if(exam.answered)return; exam.answered=true;
  const opts=document.getElementById("eopts");
  [...opts.children].forEach(b=>{
    b.classList.add("disabled");
    const o=it.opts.find(o=>o[0]===b.innerHTML);
    if(o&&o[1])b.classList.add("correct");
  });
  if(ok){btn.classList.add("correct"); if(it.sec==='listen')exam.lis++;else exam.wr++;}
  else{btn.classList.add("wrong");}
  document.getElementById("enext").style.display="block";
}
function finishExam(){
  const area=document.getElementById("examArea");
  const lisPts=exam.lis*4, wrPts=exam.wr*4, total=lisPts+wrPts;
  const pass=total>=60;
  const best=store.get("examBest",{});
  const prev=best[exam.key];
  const isNew=prev==null||total>prev;
  if(isNew){best[exam.key]=total;store.set("examBest",best);}
  renderHomeKpi();
  area.innerHTML=`
  <div class="qbox result">
    <div style="font-size:14px;color:var(--muted)">${exam.name} の結果</div>
    <div style="font-size:20px;font-weight:700;color:${pass?'var(--good)':'var(--bad)'}">${pass?'🎉 合格ライン到達！':'📖 もう少し！'}</div>
    <div class="score" style="color:${pass?'var(--good)':'var(--bad)'}">${total}点</div>
    <div style="color:var(--muted);font-size:14px">合格ライン 60点 ${isNew?'　<b style="color:var(--accent2)">自己ベスト更新！</b>':''}</div>
    <div class="kpi" style="margin-top:18px">
      <div><div class="n">${lisPts}/40</div><div class="l">聞きとり</div></div>
      <div><div class="n">${wrPts}/60</div><div class="l">筆記</div></div>
      <div><div class="n">${exam.lis+exam.wr}/25</div><div class="l">正解数</div></div>
    </div>
    <div style="color:var(--muted);font-size:13.5px;margin-top:6px">
      ${pass?'この調子で他の回にも挑戦してみましょう。':total>=48?'あと一歩。間違えた文法・単語を復習してもう一度！':'文法タブと単語帳を回してから再挑戦しましょう。'}
    </div>
    <div class="toolbar" style="justify-content:center;margin-top:18px">
      <button class="btn primary" onclick="${exam.random?'startExamRandom()':'startExam('+exam.key+')'}">${exam.random?'もう一度ランダム':'同じ回をもう一度'}</button>
      <button class="btn" onclick="buildExam();window.scrollTo({top:0,behavior:'smooth'})">メニューに戻る</button>
    </div>
  </div>`;
}

/* ============================================================
   初期化
   ============================================================ */
buildHome();buildLetters();buildPron();buildGrammar();buildVocab();buildQuiz();buildExam();
show(store.get("lastTab","home"));
</script>
</body>
</html>
